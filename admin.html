<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ell Organics — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--hot:#ff4d79;--deep:#8b1a3a;--cream:#fff5f8;--dark:#1e0f17;--muted:#9b6070;}
body{font-family:'Jost',sans-serif;background:#f8f0f3;color:var(--dark);min-height:100vh;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,var(--hot),var(--deep));display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;padding:52px 44px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--dark);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
.login-logo em{color:var(--hot);font-style:italic;}
.login-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:30px;}
.login-input{width:100%;padding:13px 16px;border:1px solid rgba(255,133,161,.3);font-size:14px;font-family:'Jost',sans-serif;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--hot);}
.login-btn{width:100%;background:var(--hot);color:#fff;border:none;padding:14px;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;}
.login-err{color:#e53935;font-size:12px;margin-top:8px;display:none;}

/* HEADER */
#mainApp{display:none;}
.admin-header{background:linear-gradient(135deg,var(--hot),var(--deep));padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#fff;letter-spacing:3px;text-transform:uppercase;}
.admin-logo em{font-style:italic;}
.header-btns{display:flex;align-items:center;gap:10px;}
.hbtn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);padding:8px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;}
.logout-btn{background:none;color:rgba(255,255,255,.5);border:none;font-size:11px;cursor:pointer;font-family:'Jost',sans-serif;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--cream);overflow-x:auto;}
.tab{padding:14px 20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.active{color:var(--hot);border-bottom-color:var(--hot);}

/* BODY */
.admin-body{max-width:960px;margin:0 auto;padding:20px 14px;}

/* STATUS */
.status-bar{background:#fff;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:12px;border-left:3px solid #ccc;}
.status-bar.ok{border-left-color:#4caf50;}
.status-bar.saving{border-left-color:#ff9800;}
.sdot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sdot.ok{background:#4caf50;}
.sdot.saving{background:#ff9800;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SECTION CARD */
.sec-card{background:#fff;margin-bottom:16px;overflow:hidden;}
.sec-head{background:var(--cream);padding:12px 18px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:600;color:var(--deep);display:flex;justify-content:space-between;align-items:center;}

/* PRODUCT ROW */
.p-row{display:grid;grid-template-columns:1fr 80px 110px 70px;gap:10px;align-items:center;padding:12px 18px;border-bottom:1px solid #f5e8ec;transition:background .15s;}
.p-row:last-child{border-bottom:none;}
.p-row:hover{background:#fdf5f7;}
.pname{font-size:13px;font-weight:500;}
.pvariant{font-size:11px;color:var(--muted);}
.price-inp{width:100%;padding:7px 8px;border:1px solid #f0d5dc;font-size:13px;font-family:'Jost',sans-serif;outline:none;text-align:center;}
.price-inp:focus{border-color:var(--hot);}
.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;}
.ttrack{width:40px;height:20px;border-radius:10px;background:#ddd;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0;}
.ttrack.on{background:var(--hot);}
.tthumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.ttrack.on .tthumb{left:22px;}
.tlabel{font-size:10px;color:var(--muted);}
.ttrack.on + .tlabel{color:var(--hot);}
.save-btn{padding:7px 12px;background:var(--hot);color:#fff;border:none;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;}
.save-btn:hover{background:var(--deep);}
.save-btn.ok{background:#4caf50;}
.save-btn.new-p{background:#7b1fa2;}

/* EXPAND ROW for desc/ingredients */
.expand-btn{font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0 18px 10px;display:block;}
.expand-content{display:none;padding:0 18px 14px;border-bottom:1px solid #f5e8ec;}
.expand-content.open{display:block;}
.mini-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;margin-top:10px;}
.mini-input{width:100%;padding:8px 10px;border:1px solid #f0d5dc;font-size:13px;font-family:'Jost',sans-serif;outline:none;resize:vertical;min-height:60px;}
.mini-input:focus{border-color:var(--hot);}

/* ADD FORM */
.add-form{background:#fff;padding:24px 20px;margin-bottom:16px;}
.add-form-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--dark);margin-bottom:18px;}
.add-form-title em{color:var(--hot);font-style:italic;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.flabel{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.finput{padding:10px 12px;border:1px solid #f0d5dc;font-size:13px;font-family:'Jost',sans-serif;outline:none;}
.finput:focus{border-color:var(--hot);}
.ftextarea{padding:10px 12px;border:1px solid #f0d5dc;font-size:13px;font-family:'Jost',sans-serif;outline:none;resize:vertical;min-height:70px;}
.ftextarea:focus{border-color:var(--hot);}
.fselect{padding:10px 12px;border:1px solid #f0d5dc;font-size:13px;font-family:'Jost',sans-serif;outline:none;background:#fff;}
.img-area{border:2px dashed #f0c0cd;padding:20px;text-align:center;cursor:pointer;position:relative;margin-top:4px;}
.img-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-area img{max-width:120px;max-height:120px;object-fit:cover;margin-top:8px;display:none;}
.add-product-btn{margin-top:18px;background:var(--hot);color:#fff;border:none;padding:13px 28px;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;width:100%;}
.add-product-btn:hover{background:var(--deep);}
.add-msg{margin-top:10px;font-size:12px;color:var(--muted);display:none;}

/* BUNDLES */
.bundle-card{background:#fff;margin-bottom:12px;padding:18px;display:grid;grid-template-columns:1fr 90px 80px 70px;gap:10px;align-items:start;}
.bundle-name{font-size:13px;font-weight:500;}
.bundle-desc{font-size:11px;color:var(--muted);margin-top:3px;}
.bundle-form{background:#fff;padding:20px;margin-bottom:16px;}
.bundle-form-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin-bottom:14px;}
.bundle-form-title em{color:var(--hot);font-style:italic;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 22px;font-size:12px;letter-spacing:1px;border-radius:2px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;}

/* TAB PANELS */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

@media(max-width:600px){
  .p-row{grid-template-columns:1fr 70px;grid-template-rows:auto auto auto;}
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:1;}
  .bundle-card{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Ell <em>Organics</em></div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>

<div id="mainApp">
  <div class="admin-header">
    <div class="admin-logo">Ell <em>Organics</em></div>
    <div class="header-btns">
      <button class="hbtn" onclick="saveAll()">💾 Save All</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('products')">📦 Products</div>
    <div class="tab" onclick="switchTab('add')">➕ Add Product</div>
    <div class="tab" onclick="switchTab('bundles')">🎁 Bundles</div>
  </div>

  <div class="admin-body">
    <div class="status-bar" id="statusBar">
      <div class="sdot" id="sdot"></div>
      <span id="statusTxt">Loading...</span>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-panel active" id="tab-products">
      <div id="productsContainer"></div>
    </div>

    <!-- ADD PRODUCT TAB -->
    <div class="tab-panel" id="tab-add">
      <div class="add-form">
        <div class="add-form-title">Add <em>New Product</em></div>
        <div class="form-grid">
          <div class="form-group">
            <label class="flabel">Product Name *</label>
            <input class="finput" id="np-name" type="text" placeholder="e.g. Rose Body Oil">
          </div>
          <div class="form-group">
            <label class="flabel">Variant / Scent</label>
            <input class="finput" id="np-variant" type="text" placeholder="e.g. Rose (optional)">
          </div>
          <div class="form-group">
            <label class="flabel">Price ($) *</label>
            <input class="finput" id="np-price" type="number" step="0.5" min="0" placeholder="e.g. 9">
          </div>
          <div class="form-group">
            <label class="flabel">Category *</label>
            <select class="fselect" id="np-cat">
              <option value="intimate">Intimate Care</option>
              <option value="hair">Hair Care</option>
              <option value="body" selected>Body Care</option>
              <option value="summer">Summer Collection</option>
            </select>
          </div>
          <div class="form-group full">
            <label class="flabel">Short Description</label>
            <textarea class="ftextarea" id="np-desc" placeholder="e.g. Lightweight rose-scented oil. Nourishes and softens skin. 100ml."></textarea>
          </div>
          <div class="form-group full">
            <label class="flabel">Ingredients</label>
            <textarea class="ftextarea" id="np-ingredients" placeholder="e.g. Aqua, Rosa Canina Fruit Oil, Tocopherol, Parfum..."></textarea>
          </div>
          <div class="form-group full">
            <label class="flabel">Product Photo</label>
            <div class="img-area" id="uploadArea">
              <input type="file" accept="image/*" onchange="previewImg(event,'imgPreview','uploadArea')">
              <div>📷 Tap to upload photo</div>
              <img id="imgPreview" src="" alt="">
            </div>
          </div>
        </div>
        <button class="add-product-btn" onclick="addNewProduct()">+ Add Product to Website</button>
        <div class="add-msg" id="addMsg"></div>
      </div>
    </div>

    <!-- BUNDLES TAB -->
    <div class="tab-panel" id="tab-bundles">
      <div class="bundle-form">
        <div class="bundle-form-title">Create <em>Bundle / Offer</em></div>
        <div class="form-grid">
          <div class="form-group">
            <label class="flabel">Bundle Name *</label>
            <input class="finput" id="bn-name" type="text" placeholder="e.g. Hair Care Set">
          </div>
          <div class="form-group">
            <label class="flabel">Bundle Price ($) *</label>
            <input class="finput" id="bn-price" type="number" step="0.5" min="0" placeholder="e.g. 24">
          </div>
          <div class="form-group full">
            <label class="flabel">What's Included</label>
            <input class="finput" id="bn-includes" type="text" placeholder="e.g. Shampoo + Conditioner + Hair Mist">
          </div>
          <div class="form-group full">
            <label class="flabel">Description / Offer Details</label>
            <textarea class="ftextarea" id="bn-desc" placeholder="e.g. Save $4 when you buy the full hair care trio."></textarea>
          </div>
          <div class="form-group full">
            <label class="flabel">Bundle Photo</label>
            <div class="img-area" id="bundleUploadArea">
              <input type="file" accept="image/*" onchange="previewImg(event,'bundleImgPreview','bundleUploadArea')">
              <div>📷 Tap to upload photo</div>
              <img id="bundleImgPreview" src="" alt="">
            </div>
          </div>
        </div>
        <button class="add-product-btn" onclick="addBundle()">+ Create Bundle</button>
        <div class="add-msg" id="bundleMsg"></div>
      </div>

      <div id="bundlesContainer"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>

var STORAGE_KEY = 'ell_organics_products_v2';

  summer: [

    {id:'sunveil-summer',name:'Sunveil',variant:'Sun Lock for Hair',price:9,inStock:true,desc:'Shields from sun exposure heat damage and environmental stress while maintaining shine.',ingredients:''},
    {id:'tanning-oil-s',name:'Tanning Oil',variant:'',price:12,inStock:true,desc:'Nourishing tanning oil that enhances your golden glow while caring for skin.',ingredients:''}

};

var CAT_LABELS = {intimate:'💗 Intimate Care',hair:'✨ Hair Care',body:'🌸 Body Care',summer:'☀️ Summer Collection'};
var currentData = {};
var bundlesData = [];
var newProductImg = '';
var newBundleImg = '';

function doLogin() {
  if (document.getElementById('pwInput').value === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('pwInput').value = '';
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.remove('active');});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  var tabs = document.querySelectorAll('.tab');
  var order = ['products','add','bundles'];
  tabs[order.indexOf(name)].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function setStatus(msg, state) {
  var bar = document.getElementById('statusBar');
  var dot = document.getElementById('sdot');
  document.getElementById('statusTxt').textContent = msg;
  dot.className = 'sdot' + (state ? ' '+state : '');
  bar.className = 'status-bar' + (state ? ' '+state : '');
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

async function loadData() {
  setStatus('Loading...', '');
  try {
    var r1 = await window.storage.get(STORAGE_KEY, true);
    currentData = r1 && r1.value ? JSON.parse(r1.value) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    var r2 = await window.storage.get(BUNDLES_KEY, true);
    bundlesData = r2 && r2.value ? JSON.parse(r2.value) : [];
    setStatus('Live — changes sync to the website automatically ✓', 'ok');
  } catch(e) {
    currentData = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    bundlesData = [];
    setStatus('Loaded defaults', '');
  }
  renderProducts();
  renderBundles();
}

function renderProducts() {
  var container = document.getElementById('productsContainer');
  container.innerHTML = '';
  var cats = ['intimate','hair','body','summer'];
  for (var c = 0; c < cats.length; c++) {
    var cat = cats[c];
    var list = currentData[cat] || [];
    var html = '<div class="sec-card"><div class="sec-head"><span>'+CAT_LABELS[cat]+'</span><span style="font-size:11px;color:var(--muted)">'+list.length+' products</span></div>';
    for (var j = 0; j < list.length; j++) {
      var p = list[j];
      var pid = p.id; var pcat = cat;
      html += '<div class="p-row" id="row-'+pid+'">';
      html += '<div><div class="pname">'+p.name+'</div>'+(p.variant?'<div class="pvariant">'+p.variant+'</div>':'')+'</div>';
      html += '<div><input class="price-inp" type="number" step="0.5" min="0" value="'+p.price+'" id="price-'+pid+'"></div>';
      html += '<div class="toggle-wrap" onclick="toggleStock(\''+pid+'\',\''+pcat+'\')">';
      html += '<div class="ttrack '+(p.inStock?'on':'')+'" id="track-'+pid+'"><div class="tthumb"></div></div>';
      html += '<span class="tlabel" id="tlabel-'+pid+'">'+(p.inStock?'In Stock':'Sold Out')+'</span></div>';
      html += '<button class="save-btn" id="sbtn-'+pid+'" onclick="saveProduct(\''+pid+'\',\''+pcat+'\')">Save</button>';
      html += '</div>';
      // Expand for desc/ingredients
      html += '<span class="expand-btn" onclick="toggleExpand(\'exp-'+pid+'\')">▸ Description & Ingredients</span>';
      html += '<div class="expand-content" id="exp-'+pid+'">';
      html += '<div class="mini-label">Description</div>';
      html += '<textarea class="mini-input" id="desc-'+pid+'" placeholder="Short product description...">'+(p.desc||'')+'</textarea>';
      html += '<div class="mini-label">Ingredients</div>';
      html += '<textarea class="mini-input" id="ing-'+pid+'" placeholder="Aqua, Rosa Canina Fruit Oil...">'+(p.ingredients||'')+'</textarea>';
      html += '<button class="save-btn" style="margin-top:8px;" onclick="saveProduct(\''+pid+'\',\''+pcat+'\')">Save Description & Ingredients</button>';
      html += '</div>';
    }
    html += '</div>';
    container.innerHTML += html;
  }
}

function toggleExpand(id) {
  var el = document.getElementById(id);
  el.classList.toggle('open');
  var btn = el.previousElementSibling;
  btn.textContent = el.classList.contains('open') ? '▾ Description & Ingredients' : '▸ Description & Ingredients';
}

function toggleStock(id, cat) {
  var list = currentData[cat];
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) {
      list[i].inStock = !list[i].inStock;
      var track = document.getElementById('track-'+id);
      var label = document.getElementById('tlabel-'+id);
      track.classList.toggle('on', list[i].inStock);
      label.textContent = list[i].inStock ? 'In Stock' : 'Sold Out';
      break;
    }
  }
}

async function saveProduct(id, cat) {
  var list = currentData[cat];
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) {
      var pi = document.getElementById('price-'+id);
      var di = document.getElementById('desc-'+id);
      var ii = document.getElementById('ing-'+id);
      if (pi) list[i].price = parseFloat(pi.value) || list[i].price;
      if (di) list[i].desc = di.value;
      if (ii) list[i].ingredients = ii.value;
      break;
    }
  }
  var btn = document.getElementById('sbtn-'+id);
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  setStatus('Saving...','saving');
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(currentData), true);
    if (btn) { btn.textContent = '✓'; btn.classList.add('ok'); setTimeout(function(){btn.textContent='Save';btn.classList.remove('ok');btn.disabled=false;},1800); }
    setStatus('Saved — website updated ✓','ok');
    showToast('Saved!');
  } catch(e) {
    if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
    setStatus('Error saving','');
    showToast('Error — try again');
  }
}

async function saveAll() {
  var cats = ['intimate','hair','body','summer'];
  for (var c = 0; c < cats.length; c++) {
    var list = currentData[cats[c]] || [];
    for (var i = 0; i < list.length; i++) {
      var p = list[i];
      var pi = document.getElementById('price-'+p.id);
      var di = document.getElementById('desc-'+p.id);
      var ii = document.getElementById('ing-'+p.id);
      if (pi) p.price = parseFloat(pi.value) || p.price;
      if (di) p.desc = di.value;
      if (ii) p.ingredients = ii.value;
    }
  }
  setStatus('Saving all...','saving');
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(currentData), true);
    setStatus('All saved — website updated ✓','ok');
    showToast('All changes saved!');
  } catch(e) {
    setStatus('Error','');
    showToast('Error saving');
  }
}

function previewImg(event, previewId, areaId) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById(previewId);
    img.src = e.target.result;
    img.style.display = 'block';
    if (previewId === 'imgPreview') newProductImg = e.target.result;
    else newBundleImg = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function addNewProduct() {
  var name = document.getElementById('np-name').value.trim();
  var variant = document.getElementById('np-variant').value.trim();
  var price = parseFloat(document.getElementById('np-price').value) || 0;
  var cat = document.getElementById('np-cat').value;
  var desc = document.getElementById('np-desc').value.trim();
  var ingredients = document.getElementById('np-ingredients').value.trim();
  var msg = document.getElementById('addMsg');
  if (!name || !price) { msg.textContent = 'Please enter product name and price.'; msg.style.display='block'; msg.style.color='#e53935'; return; }
  var id = 'custom-' + Date.now();
  var newP = {id:id, name:name, variant:variant, price:price, inStock:true, desc:desc, ingredients:ingredients, img:newProductImg};
  if (!currentData[cat]) currentData[cat] = [];
  currentData[cat].push(newP);
  msg.textContent = 'Saving...'; msg.style.display='block'; msg.style.color=getComputedStyle(document.documentElement).getPropertyValue('--muted');
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(currentData), true);
    msg.textContent = '✓ "'+name+'" added successfully! It will appear on the website now.';
    msg.style.color = '#4caf50';
    document.getElementById('np-name').value='';
    document.getElementById('np-variant').value='';
    document.getElementById('np-price').value='';
    document.getElementById('np-desc').value='';
    document.getElementById('np-ingredients').value='';
    document.getElementById('imgPreview').style.display='none';
    newProductImg = '';
    renderProducts();
    showToast(name+' added!');
  } catch(e) {
    msg.textContent = 'Error saving. Try again.'; msg.style.color='#e53935';
  }
}

function renderBundles() {
  var container = document.getElementById('bundlesContainer');
  if (!bundlesData.length) { container.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px;">No bundles yet. Create your first one above.</div>'; return; }
  var html = '<div class="sec-card"><div class="sec-head"><span>🎁 Active Bundles</span></div>';
  for (var i = 0; i < bundlesData.length; i++) {
    var b = bundlesData[i];
    html += '<div class="bundle-card">';
    html += '<div><div class="bundle-name">'+b.name+'</div><div class="bundle-desc">'+(b.includes||'')+'</div><div class="bundle-desc" style="margin-top:4px">'+(b.desc||'')+'</div></div>';
    html += '<div style="font-family:Cormorant Garamond,serif;font-size:18px;">$'+b.price+'</div>';
    html += '<div class="toggle-wrap" onclick="toggleBundle('+i+')">';
    html += '<div class="ttrack '+(b.active!==false?'on':'')+'" id="btrack-'+i+'"><div class="tthumb"></div></div>';
    html += '<span class="tlabel" id="btlabel-'+i+'">'+(b.active!==false?'Active':'Hidden')+'</span></div>';
    html += '<button class="save-btn" onclick="deleteBundle('+i+')" style="background:#e53935;">Delete</button>';
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function toggleBundle(i) {
  bundlesData[i].active = !bundlesData[i].active;
  var track = document.getElementById('btrack-'+i);
  var label = document.getElementById('btlabel-'+i);
  track.classList.toggle('on', bundlesData[i].active);
  label.textContent = bundlesData[i].active ? 'Active' : 'Hidden';
  saveBundles();
}

async function deleteBundle(i) {
  if (!confirm('Delete this bundle?')) return;
  bundlesData.splice(i,1);
  await saveBundles();
  renderBundles();
}

async function saveBundles() {
  try {
    await window.storage.set(BUNDLES_KEY, JSON.stringify(bundlesData), true);
    showToast('Bundles saved!');
  } catch(e) { showToast('Error saving bundles'); }
}

async function addBundle() {
  var name = document.getElementById('bn-name').value.trim();
  var price = parseFloat(document.getElementById('bn-price').value) || 0;
  var includes = document.getElementById('bn-includes').value.trim();
  var desc = document.getElementById('bn-desc').value.trim();
  var msg = document.getElementById('bundleMsg');
  if (!name || !price) { msg.textContent='Please enter bundle name and price.'; msg.style.display='block'; msg.style.color='#e53935'; return; }
  bundlesData.push({id:'bundle-'+Date.now(), name:name, price:price, includes:includes, desc:desc, img:newBundleImg, active:true});
  msg.textContent='Saving...'; msg.style.display='block';
  try {
    await window.storage.set(BUNDLES_KEY, JSON.stringify(bundlesData), true);
    msg.textContent='✓ Bundle "'+name+'" created!'; msg.style.color='#4caf50';
    document.getElementById('bn-name').value='';
    document.getElementById('bn-price').value='';
    document.getElementById('bn-includes').value='';
    document.getElementById('bn-desc').value='';
    document.getElementById('bundleImgPreview').style.display='none';
    newBundleImg='';
    renderBundles();
    showToast('Bundle created!');
  } catch(e) { msg.textContent='Error saving.'; msg.style.color='#e53935'; }
}
</script>
</body>
</html>
